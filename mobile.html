<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Lunalanda</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; -webkit-user-select: none; }
      html, body { background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; color: #0f0; width: 100%; height: 100%; }

      /* ── HUD — fixed strip at top ── */
      #hud {
        position: fixed; top: 0; left: 0; right: 0; height: 44px;
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 10px; z-index: 10;
        background: #000a;
        font-size: 12px; letter-spacing: 0.05em;
      }
      .hud-item { display: flex; flex-direction: column; gap: 1px; }
      .hud-label { font-size: 9px; color: #0f08; text-transform: uppercase; }
      .hud-value { font-size: 12px; }
      .hud-value.warn { color: #ff0; }
      .hud-value.danger { color: #f40; }

      /* ── Canvas — fills space between HUD and controls ── */
      #canvas-wrap {
        position: fixed; top: 44px; left: 0; right: 0; bottom: 80px;
        overflow: hidden;
      }
      canvas { display: block; }

      /* ── Overlay — sits on top of canvas ── */
      #overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; pointer-events: none;
      }
      #overlay h1 { font-size: 32px; text-shadow: 0 0 20px #0f0; }
      #overlay p { font-size: 13px; color: #0f08; text-align: center; padding: 0 20px; }
      #overlay.hidden { display: none; }

      /* ── Controls — fixed strip at bottom ── */
      #controls {
        position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
        display: flex; gap: 10px; padding: 10px 12px;
        background: #000a;
      }
      .ctrl-btn {
        flex: 1;
        background: #0f01;
        border: 1px solid #0f05;
        color: #0f0;
        font-family: 'Courier New', monospace;
        font-size: 28px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 6px;
        cursor: pointer;
        touch-action: none;
      }
      .ctrl-btn:active { background: #0f04; border-color: #0f09; }
      #btn-thrust { flex: 1.5; font-size: 16px; letter-spacing: 0.1em; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">Fuel</span>
        <span class="hud-value" id="hud-fuel">100%</span>
      </div>
      <div class="hud-item" style="text-align:center">
        <span class="hud-label">Velocity</span>
        <span class="hud-value" id="hud-vel">0.0 m/s</span>
      </div>
      <div class="hud-item" style="text-align:center">
        <span class="hud-label">Altitude</span>
        <span class="hud-value" id="hud-alt">0 m</span>
      </div>
      <div class="hud-item" style="text-align:center">
        <span class="hud-label">Lives</span>
        <span class="hud-value" id="hud-lives">♦ ♦ ♦</span>
      </div>
      <div class="hud-item" style="text-align:right">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="hud-score">0</span>
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <h1 id="overlay-title">LUNALANDA</h1>
        <p id="overlay-sub">BUTTONS BELOW TO FLY &nbsp;|&nbsp; TAP SCREEN TO LAUNCH</p>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-left">◄</button>
      <button class="ctrl-btn" id="btn-thrust">▲ THRUST</button>
      <button class="ctrl-btn" id="btn-right">►</button>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/mobile-a.js"></script>
  </body>
</html>
