<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />
    <title>Lunalanda — C: Tilt</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { background: #000; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; color: #0f0; }
      #game-container { position: fixed; width: 960px; display: flex; flex-direction: column; align-items: center; will-change: transform; }
      canvas { display: block; border: 1px solid #0f04; }
      #canvas-wrap { position: relative; width: 960px; height: 648px; }
      #hud { width: 960px; display: flex; justify-content: space-between; padding: 6px 4px; font-size: 13px; letter-spacing: 0.05em; }
      .hud-item { display: flex; flex-direction: column; gap: 2px; }
      .hud-label { font-size: 10px; color: #0f08; text-transform: uppercase; }
      .hud-value { font-size: 13px; }
      .hud-value.warn { color: #ff0; }
      .hud-value.danger { color: #f40; }
      #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; pointer-events: none; }
      #overlay h1 { font-size: 36px; text-shadow: 0 0 20px #0f0; }
      #overlay p { font-size: 14px; color: #0f08; }
      #overlay.hidden { display: none; }
      /* ── Tilt bar ── */
      #tilt-bar {
        width: 960px; height: 70px;
        display: flex; align-items: center; justify-content: center; gap: 24px;
        padding: 0 24px;
        border-top: 1px solid #0f03;
      }
      #tilt-btn {
        background: #0f01; border: 1px solid #0f06; color: #0f0;
        font-family: 'Courier New', monospace; font-size: 14px;
        padding: 10px 20px; border-radius: 4px; cursor: pointer;
        letter-spacing: 0.05em; touch-action: none;
      }
      #tilt-btn:active { background: #0f03; }
      #tilt-status { font-size: 13px; color: #0f06; letter-spacing: 0.08em; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-item">
          <span class="hud-label">Fuel</span>
          <span class="hud-value" id="hud-fuel">100%</span>
        </div>
        <div class="hud-item" style="text-align:center">
          <span class="hud-label">Velocity</span>
          <span class="hud-value" id="hud-vel">0.0 m/s</span>
        </div>
        <div class="hud-item" style="text-align:center">
          <span class="hud-label">Altitude</span>
          <span class="hud-value" id="hud-alt">0 m</span>
        </div>
        <div class="hud-item" style="text-align:center">
          <span class="hud-label">Lives</span>
          <span class="hud-value" id="hud-lives">♦ ♦ ♦</span>
        </div>
        <div class="hud-item" style="text-align:right">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
      </div>
      <div id="canvas-wrap">
        <canvas id="canvas" width="960" height="648"></canvas>
        <div id="overlay">
          <h1 id="overlay-title">LUNALANDA</h1>
          <p id="overlay-sub">TILT TO ROTATE &nbsp;|&nbsp; HOLD TO THRUST &nbsp;|&nbsp; TAP TO LAUNCH</p>
        </div>
      </div>
      <div id="tilt-bar">
        <button id="tilt-btn">ENABLE TILT</button>
        <span id="tilt-status"></span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/mobile-c.js"></script>
  </body>
</html>
